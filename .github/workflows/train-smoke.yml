name: smoke-train

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'configs/**'
      - '.github/workflows/train-smoke.yml'

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Sync environment
        run: uv sync --extra dev
      - name: Train sklearn baseline
        run: uv run bc-mlops train --config configs/train.yaml --output-dir artifacts/runs
      - name: Train pytorch baseline
        run: uv run bc-mlops train --config configs/train-pytorch.yaml --output-dir artifacts/runs
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: training-artifacts
          path: |
            artifacts/runs/**
            artifacts/registry.json
            mlruns/**
